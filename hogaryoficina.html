<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mexx - Categoria</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.card:hover {
    transform: translateY(-8px) scale(1.02);
}
</style>

</head>

<body class="bg-[#121212] text-white font-sans p-6">

<!-- TITULO -->
<h1 class="text-3xl font-bold text-orange-500 mb-6">
    Mexx - Tienda
</h1>

<!-- MENU (IGUAL AL HOME) -->
<div id="tree" class="mb-10"></div>

<!-- CONTENIDO -->
<div class="max-w-7xl mx-auto">

    <h2 id="titulo" class="text-3xl font-bold text-orange-400 mb-2"></h2>
    <p id="descripcion" class="text-zinc-400 mb-8"></p>

    <div id="productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>

</div>

<script>

// ================= MENU =================
const data = {
    name: "Menu",
    icon: "gamepad-2",
    children: [
        {
            name: "PCs Armadas",
            icon: "monitor",
            children: [
                { name: "Hogar y Oficina (Estas Aqui)", link: "hogar-oficina.html" },
                { name: "Entretenimiento", link: "#" },
                { name: "Gamers", link: "#" }
            ]
        },
        {
            name: "Componentes",
            icon: "cpu",
            children: [
                { name: "Procesadores", link: "#" },
                { name: "RAM", link: "#" },
                { name: "Placas de Video", link: "#" },
                { name: "Almacenamiento", link: "#" }
            ]
        },
        {
            name: "Periféricos",
            icon: "mouse",
            children: [
                { name: "Monitores", link: "#" },
                { name: "Teclados", link: "#" },
                { name: "Mouses", link: "#" },
                { name: "Auriculares", link: "#" }
            ]
        },
        {
            name: "Notebooks",
            icon: "laptop",
            children: [
                { name: "Notebooks", link: "#" },
                { name: "Mini PC", link: "#" }
            ]
        }
    ]
};

function crearNodo(nodo, root = false) {

    const contenedor = document.createElement("div");
    contenedor.className = "ml-4 mt-2";

    const tarjeta = document.createElement("div");
    tarjeta.className = "flex items-center gap-2 bg-zinc-800 px-3 py-2 rounded cursor-pointer hover:bg-orange-500 transition";

    if(root){
        tarjeta.className = "flex items-center gap-2 bg-orange-600 px-5 py-3 rounded font-bold";
    }

    if(nodo.icon){
        const icon = document.createElement("i");
        icon.setAttribute("data-lucide", nodo.icon);
        icon.className = "w-5 h-5";
        tarjeta.appendChild(icon);
    }

    const texto = document.createElement("span");
    texto.textContent = nodo.name;
    tarjeta.appendChild(texto);

    contenedor.appendChild(tarjeta);

    if(nodo.children){
        const hijos = document.createElement("div");
        hijos.className = "ml-4 border-l border-orange-500 pl-3";
        hijos.style.display = "none";

        nodo.children.forEach(h => hijos.appendChild(crearNodo(h)));

        tarjeta.onclick = () => {
            hijos.style.display = hijos.style.display === "none" ? "block" : "none";
        };

        contenedor.appendChild(hijos);
    }

    // 🔥 CLICK CON LINK (FIX BUG)
    if(nodo.link){
        tarjeta.onclick = (e) => {
            e.stopPropagation();
            window.location.href = nodo.link;
        };
    }

    return contenedor;
}

document.getElementById("tree").appendChild(crearNodo(data, true));

// ================= CONFIG PRODUCTOS =================

const config = {
    titulo: "PCs Hogar y Oficina",
    descripcion: "Equipos ideales para estudio, trabajo y uso diario.",
    productos: [
        {
            nombre: "PC Oficina Básica",
            specs: "Intel i3 • 8GB • SSD 240GB",
            precio: 299999,
            img: "https://images.unsplash.com/photo-1587202372775-e229f172b9d7"
        },
        {
            nombre: "PC Oficina Plus",
            specs: "Ryzen 5 • 16GB • SSD 480GB",
            precio: 449999,
            img: "https://images.unsplash.com/photo-1593640408182-31c70c8268f5"
        },
        {
            nombre: "PC Oficina Pro",
            specs: "Intel i5 • 16GB • SSD 1TB",
            precio: 599999,
            img: "https://images.unsplash.com/photo-1585076641399-5c06d1b3365f"
        },
        {
            nombre: "Mini PC Compacta",
            specs: "Intel N100 • 8GB • SSD 256GB",
            precio: 249999,
            img: "https://images.unsplash.com/photo-1606813907291-d86efa9b94db"
        },
        {
            nombre: "PC Multitarea",
            specs: "i5 12th • 16GB • SSD 512GB",
            precio: 529999,
            img: "https://images.unsplash.com/photo-1547082299-de196ea013d6"
        },
        {
            nombre: "PC Premium Office",
            specs: "i7 • 32GB • SSD 1TB",
            precio: 799999,
            img: "https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04"
        }
    ]
};

// ================= RENDER PRODUCTOS =================

document.getElementById("titulo").textContent = config.titulo;
document.getElementById("descripcion").textContent = config.descripcion;

const contenedor = document.getElementById("productos");

config.productos.forEach(p => {

    const card = document.createElement("div");
    card.className = "card bg-zinc-800 rounded-3xl overflow-hidden transition duration-300";

    card.innerHTML = `
        <div class="overflow-hidden">
            <img src="${p.img}" class="w-full h-56 object-cover hover:scale-110 transition duration-500">
        </div>

        <div class="p-5">
            <h3 class="text-lg font-semibold mb-1">${p.nombre}</h3>
            <p class="text-zinc-400 text-sm mb-4">${p.specs}</p>

            <div class="flex justify-between items-center">
                <span class="text-2xl font-bold text-orange-400">
                    $${p.precio.toLocaleString()}
                </span>

                <button onclick="agregar()" 
                    class="bg-orange-500 px-4 py-2 rounded-xl hover:bg-orange-600 flex items-center gap-2 active:scale-90 transition">
                    <i data-lucide="shopping-cart"></i>
                </button>
            </div>
        </div>
    `;

    contenedor.appendChild(card);
});

function agregar(){
    alert("Producto agregado 🛒");
}

lucide.createIcons();

</script>

</body>
</html>
