<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mexx</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<!-- 🔥 FUENTE PRO -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
}

/* 🔥 MODAL ANIMACIÓN */
.modal {
    backdrop-filter: blur(10px);
    animation: fadeIn 0.3s ease;
}

.modal-content {
    animation: zoomIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes zoomIn {
    from {transform: scale(0.8);}
    to {transform: scale(1);}
}
</style>

</head>

<body class="bg-[#0f0f0f] text-white">

<!-- 🔥 HEADER PRO -->
<div class="p-6 border-b border-zinc-800 bg-[#0f0f0f]/80 backdrop-blur sticky top-0 z-50">
    <h1 class="text-3xl font-bold text-orange-500 tracking-wide">
        Mexx
    </h1>
    <p class="text-zinc-400 text-sm mt-1" id="descripcion"></p>
</div>

<!-- MENU -->
<div id="tree" class="p-6"></div>

<!-- CONTENIDO -->
<div class="max-w-7xl mx-auto px-6 pb-10">

    <h2 id="titulo" class="text-3xl font-semibold text-white mb-6"></h2>

    <div id="productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>

</div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
    <div class="modal-content bg-zinc-900 rounded-3xl max-w-4xl w-full p-6 relative">

        <button onclick="cerrarModal()" 
            class="absolute top-4 right-4 bg-zinc-700 p-2 rounded-full hover:bg-red-500 transition">
            <i data-lucide="x"></i>
        </button>

        <div id="modalContenido" class="grid md:grid-cols-2 gap-6"></div>

    </div>
</div>

<script>

// ================= MENU =================
const data = {
    name: "Menu",
    children: [
        {
            name: "PCs Armadas",
            children: [
                { name: "Hogar y Oficina", link: "hogar-oficina.html" },
                { name: "Gamers", link: "#" }
            ]
        }
    ]
};

function crearNodo(nodo) {

    const cont = document.createElement("div");
    const btn = document.createElement("div");

    btn.className = "bg-zinc-800 px-3 py-2 rounded cursor-pointer hover:bg-orange-500 mb-2";
    btn.textContent = nodo.name;

    cont.appendChild(btn);

    if(nodo.children){
        const hijos = document.createElement("div");
        hijos.className = "ml-4 hidden";

        nodo.children.forEach(h => hijos.appendChild(crearNodo(h)));

        btn.onclick = () => hijos.classList.toggle("hidden");
        cont.appendChild(hijos);
    }

    if(nodo.link){
        btn.onclick = () => location.href = nodo.link;
    }

    return cont;
}

document.getElementById("tree").appendChild(crearNodo(data));

// ================= CONFIG =================
const config = {
    titulo: "PCs Hogar y Oficina",
    descripcion: "Equipos ideales para estudio, trabajo y uso diario.",
    productos: [
        {
            nombre: "PC Básica",
            specs: "i3 • 8GB • SSD 240GB",
            precio: 299999,
            img: "https://images.unsplash.com/photo-1587202372775-e229f172b9d7",
            desc: "Ideal para tareas básicas, Word, Excel y navegación."
        },
        {
            nombre: "PC Plus",
            specs: "Ryzen 5 • 16GB",
            precio: 449999,
            img: "https://images.unsplash.com/photo-1593640408182-31c70c8268f5",
            desc: "Perfecta para multitarea y trabajo diario."
        },
        {
            nombre: "PC Pro",
            specs: "i5 • 16GB • 1TB",
            precio: 599999,
            img: "https://images.unsplash.com/photo-1585076641399-5c06d1b3365f",
            desc: "Alto rendimiento para uso intensivo."
        },
        {
            nombre: "Mini PC",
            specs: "Compacta • 8GB",
            precio: 249999,
            img: "https://images.unsplash.com/photo-1606813907291-d86efa9b94db",
            desc: "Ahorro de espacio y bajo consumo."
        },
        {
            nombre: "PC Premium",
            specs: "i7 • 32GB",
            precio: 799999,
            img: "https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04",
            desc: "Para usuarios exigentes."
        },
        {
            nombre: "PC Oficina X",
            specs: "Ryzen 3 • 8GB",
            precio: 319999,
            img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8",
            desc: "Uso diario y fluido."
        }
    ]
};

// ================= RENDER =================
document.getElementById("titulo").textContent = config.titulo;
document.getElementById("descripcion").textContent = config.descripcion;

const contenedor = document.getElementById("productos");

config.productos.forEach(p => {

    const card = document.createElement("div");
    card.className = "card bg-zinc-800 rounded-3xl overflow-hidden transition cursor-pointer";

    card.innerHTML = `
        <img src="${p.img}" class="w-full h-56 object-cover">
        <div class="p-4">
            <h3 class="font-semibold">${p.nombre}</h3>
            <p class="text-sm text-zinc-400">${p.specs}</p>
            <span class="text-orange-400 font-bold block mt-2">$${p.precio.toLocaleString()}</span>
        </div>
    `;

    card.onclick = () => abrirModal(p);

    contenedor.appendChild(card);
});

// ================= MODAL =================

function abrirModal(p){

    const modal = document.getElementById("modal");
    const contenido = document.getElementById("modalContenido");

    contenido.innerHTML = `
        <img src="${p.img}" class="w-full h-80 object-cover rounded-xl">

        <div>
            <h2 class="text-2xl font-bold mb-2">${p.nombre}</h2>
            <p class="text-zinc-400 mb-4">${p.specs}</p>
            <p class="mb-6">${p.desc}</p>

            <span class="text-3xl text-orange-400 font-bold">
                $${p.precio.toLocaleString()}
            </span>

            <button class="mt-6 w-full bg-orange-500 py-3 rounded-xl hover:bg-orange-600 transition">
                Agregar al carrito 🛒
            </button>
        </div>
    `;

    modal.classList.remove("hidden");
    modal.classList.add("flex");

    lucide.createIcons();
}

function cerrarModal(){
    const modal = document.getElementById("modal");
    modal.classList.add("hidden");
}

lucide.createIcons();

</script>

</body>
</html>
